name: mobimart_app
description: "A new Flutter e-commerce project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0


dependencies:
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.0.0

  # Firebase (compatible versions)
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.8.0

  # Shimmer effect
  shimmer: ^3.0.0

  # For generating unique IDs
  uuid: ^3.0.7
  flutter_launcher_icons: ^0.14.4
  iconly: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/mobimart.png
    - assets/icons/app_icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
